apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: false
    uid: prometheus

  - name: Jaeger
    type: jaeger
    access: proxy
    url: http://jaeger:16686
    isDefault: false
    uid: jaeger
    jsonData:
      tracesToLogsV2:
        datasourceUid: loki
        spanStartTimeShift: 5m
        spanEndTimeShift: -5m
        customQuery: true
        query: '{job="llm-service"} |= ''"trace_id":"$${__trace.traceId}"'''
      tracesToMetrics:
        datasourceUid: prometheus
        spanStartTimeShift: 5m
        spanEndTimeShift: -5m
        queries:
          - name: Request rate
            query: sum(rate(gen_ai_request_count_total[5m]))
          - name: Error rate
            query: sum(rate(gen_ai_request_error_count_total[5m]))
          - name: Client latency p95
            query: histogram_quantile(0.95, sum by (le) (rate(gen_ai_client_operation_duration_bucket[5m])))
      nodeGraph:
        enabled: true

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: true
    uid: loki
    jsonData:
      derivedFields:
        - name: TraceID
          matcherRegex: '"trace_id":"([a-f0-9]+)"'
          url: "$${__value.raw}"
          datasourceUid: jaeger
          urlDisplayLabel: View Trace
