server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: llm-service
    static_configs:
      - targets:
          - localhost
        labels:
          job: llm-service
          __path__: /var/log/llm-service/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            trace_id: trace_id
            span_id: span_id
            msg: msg
            service: service
            request_id: "request.id"
            session_id: "session.id"
            conversation_id: "conversation.id"
      - labels:
          level:
          trace_id:
          span_id:
          service:
